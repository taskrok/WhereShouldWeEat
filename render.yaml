services:
  - type: web
    name: whereshouldsweeat-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: USE_MOCK_DATA
        value: "false"
      - key: CLIENT_URL
        sync: false
